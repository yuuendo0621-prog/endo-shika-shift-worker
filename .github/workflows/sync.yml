name: Shift Sync

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [shift_sync]

concurrency:
  group: shift-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run shift sync worker
        env:
          DENTIS_USERNAME: ${{ secrets.DENTIS_USERNAME }}
          DENTIS_PASSWORD: ${{ secrets.DENTIS_PASSWORD }}
          DENTIS_SLUG: ${{ secrets.DENTIS_SLUG }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node worker.js
